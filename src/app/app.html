<div class="app-layout" [class.dark]="darkMode()">
  <!-- Permanent sidebar — desktop -->
  @if (!isMobile()) {
    <aside class="sidebar">
      <ng-container *ngTemplateOutlet="sidebarContent" />
    </aside>
  }

  <!-- Temporary drawer — mobile -->
  @if (isMobile()) {
    <mat-sidenav-container class="mobile-container">
      <mat-sidenav
        [opened]="mobileOpen"
        mode="over"
        (closed)="mobileOpen = false"
        class="mobile-drawer"
      >
        <ng-container *ngTemplateOutlet="sidebarContent" />
      </mat-sidenav>
      <mat-sidenav-content>
        <ng-container *ngTemplateOutlet="mainContent" />
      </mat-sidenav-content>
    </mat-sidenav-container>
  }

  <!-- Desktop main -->
  @if (!isMobile()) {
    <div class="main-column">
      <ng-container *ngTemplateOutlet="mainContent" />
    </div>
  }
</div>

<!-- Sidebar template -->
<ng-template #sidebarContent>
  <div class="sidebar-inner">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <mat-icon>wb_sunny</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-title">Solar</span>
        <span class="brand-subtitle">Tracker</span>
      </div>
    </div>

    <mat-divider />

    <!-- Nav -->
    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="nav-active"
          (click)="onNavClick()"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <!-- Footer -->
    <div class="sidebar-footer">
      <span>v1.0.0 — IoT Solar</span>
    </div>
  </div>
</ng-template>

<!-- Main content template -->
<ng-template #mainContent>
  <header class="app-bar">
    @if (isMobile()) {
      <button mat-icon-button (click)="mobileOpen = true" aria-label="open navigation">
        <mat-icon>menu</mat-icon>
      </button>
    }
    <span class="app-bar-title">Solar Tracker</span>
    <span class="spacer"></span>
    <button
      mat-icon-button
      (click)="toggleTheme()"
      [matTooltip]="darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      aria-label="toggle theme"
    >
      <mat-icon>{{ darkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </header>
  <main class="page-content">
    <router-outlet />
  </main>
</ng-template>
