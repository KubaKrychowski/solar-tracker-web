<mat-toolbar color="primary">
  <button mat-icon-button (click)="sidenavOpen = !sidenavOpen">
    <mat-icon>menu</mat-icon>
  </button>
  <span>Solar Tracker</span>
</mat-toolbar>
<mat-sidenav-container>
  <mat-sidenav [opened]="sidenavOpen" mode="side">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/control" routerLinkActive="active">
        <mat-icon matListItemIcon>3d_rotation</mat-icon>
        <span>Control</span>
      </a>
      <a mat-list-item routerLink="/charts" routerLinkActive="active">
        <mat-icon matListItemIcon>show_chart</mat-icon>
        <span>Charts</span>
      </a>
      <a mat-list-item routerLink="/power" routerLinkActive="active">
        <mat-icon matListItemIcon>battery_charging_full</mat-icon>
        <span>Power</span>
      </a>
      <a mat-list-item routerLink="/alarms" routerLinkActive="active">
        <mat-icon matListItemIcon>warning</mat-icon>
        <span>Alarms</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
