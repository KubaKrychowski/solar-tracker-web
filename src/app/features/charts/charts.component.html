<div class="charts-container">
  <div class="charts-header">
    <h2 class="page-title">Charts</h2>
    <mat-button-toggle-group
      [value]="range()"
      (change)="range.set($event.value)"
      class="range-toggle"
    >
      <mat-button-toggle value="6H">6H</mat-button-toggle>
      <mat-button-toggle value="12H">12H</mat-button-toggle>
      <mat-button-toggle value="24H">24H</mat-button-toggle>
      <mat-button-toggle value="7D">7D</mat-button-toggle>
      <mat-button-toggle value="30D">30D</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <!-- Power Output -->
  <mat-card class="chart-card">
    <mat-card-header>
      <mat-card-title>Power Output (W)</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas #powerCanvas></canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Voltage & Current -->
  <mat-card class="chart-card">
    <mat-card-header>
      <mat-card-title>Voltage & Current</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas #voltageCanvas></canvas>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Temperature -->
  <mat-card class="chart-card">
    <mat-card-header>
      <mat-card-title>Temperature (°C)</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="chart-wrapper">
        <canvas #temperatureCanvas></canvas>
      </div>
    </mat-card-content>
  </mat-card>
</div>
